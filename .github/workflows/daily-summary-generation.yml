name: Daily Summary Generation

on:
  schedule:
    # Every day at 18:00 UTC (19:00 Polish winter time / 20:00 Polish summer time)
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  trigger-summary-generation:
    runs-on: ubuntu-latest
    environment: production
    # Allow up to 6 hours for processing all queued summaries
    timeout-minutes: 360

    steps:
      - name: Queue Videos for Generation
        run: |
          TARGET_URL="${{ secrets.APP_URL || 'https://videosummary.org' }}/api/summaries/generate-all"

          echo "Queueing videos for summary generation at $TARGET_URL"

          response=$(curl -s -w "\n%{http_code}" -X POST \
            "$TARGET_URL" \
            --http1.1 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response Code: $http_code"
          echo "Response Body: $body"

          if [ "$http_code" -ne 202 ] && [ "$http_code" -ne 200 ]; then
            echo "Failed to queue videos for generation."
            exit 1
          fi

          echo "Videos queued successfully!"

      - name: Process Queue (up to 50 items)
        run: |
          PROCESS_URL="${{ secrets.APP_URL || 'https://videosummary.org' }}/api/summaries/process-next"

          echo "Processing queued summaries..."

          # Process up to 50 items (or until queue is empty)
          for i in $(seq 1 50); do
            echo ""
            echo "=== Processing item $i ==="
            
            response=$(curl -s -w "\n%{http_code}" -X POST \
              "$PROCESS_URL" \
              --http1.1 \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json" \
              --max-time 600)
            
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            
            echo "Response: $body"
            
            if [ "$http_code" -ne 200 ]; then
              echo "Process-next failed with code $http_code"
              continue
            fi
            
            # Check if there are no more items to process
            if echo "$body" | grep -q '"processed":false'; then
              echo ""
              echo "Queue is empty - all items processed!"
              break
            fi
            
            echo "Item $i processed."
          done

          echo ""
          echo "Daily summary generation completed!"
