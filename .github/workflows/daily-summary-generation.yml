name: Daily Summary Generation

on:
  schedule:
    # Every day at 21:23 UTC (9:23 PM UTC)
    - cron: '58 20 * * *'
  workflow_dispatch:

jobs:
  trigger-summary-generation:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Daily Summary Generation
        run: |
          # Use APP_URL if provided, otherwise default to the production URL
          TARGET_URL="${{ secrets.APP_URL }}/api/summaries/generate-all"
          
          echo "Triggering summary generation at $TARGET_URL"
          
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "$TARGET_URL" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "Response Code: $http_code"
          echo "Response Body: $body"
          
          if [ "$http_code" -ne 202 ] && [ "$http_code" -ne 200 ]; then
            echo "Failed to trigger summary generation."
            exit 1
          fi