name: Process Summary Queue

on:
  schedule:
    # Every 10 minutes - process pending summary queue items
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  process-queue:
    runs-on: ubuntu-latest
    environment: production
    # Timeout after 10 minutes (for Gradio long-running tasks)
    timeout-minutes: 10

    steps:
      - name: Process Next Queue Item
        run: |
          TARGET_URL="${{ secrets.APP_URL || 'https://videosummary.org' }}/api/summaries/process-next"

          echo "🔍 Debugging information:"
          echo "  - Target URL: $TARGET_URL"
          echo "  - Has CRON_SECRET: ${{ secrets.CRON_SECRET != '' }}"
          echo "  - Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo ""
          echo "🚀 Processing queue at $TARGET_URL"

          response=$(curl -s -w "\n%{http_code}" -X POST \
            "$TARGET_URL" \
            --http1.1 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 600)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo ""
          echo "📊 Response Code: $http_code"
          echo "📝 Response Body: $body"
          echo ""

          # Success even if no items to process (200 with processed: false)
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Failed to process queue."
            echo ""
            echo "🔍 Troubleshooting tips:"
            echo "  1. Check if CRON_SECRET is set in GitHub Secrets (production environment)"
            echo "  2. Check if SUPABASE_URL is set in GitHub Secrets (production environment)"
            echo "  3. Check if SUPABASE_SERVICE_ROLE_KEY is set in GitHub Secrets (production environment)"
            echo "  4. Verify the secrets match your production Supabase project"
            echo "  5. Check application logs for detailed error messages"
            exit 1
          fi

          echo "✅ Queue processing completed successfully"
